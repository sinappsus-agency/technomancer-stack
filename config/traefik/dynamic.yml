# Traefik Dynamic Configuration
# c:\Users\artgr\OneDrive\BACKUP\HTH\technomancer-stack\config\traefik\dynamic.yml
# Reloaded automatically without restarting Traefik when this file changes.

http:
  middlewares:

    # ── Security headers ─────────────────────────────────────────────────────
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Server: ""
        # contentSecurityPolicy is intentionally omitted here — set per-service
        # via additional labels in docker-compose where it won't break iframes
        # (MinIO console, n8n, ERPNext all embed content).

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Protects public-facing webhooks and APIs from abuse.
    rate-limit-default:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    rate-limit-strict:
      # For login pages and sensitive endpoints
      rateLimit:
        average: 10
        burst: 5
        period: 1m

    # ── Compressed responses ──────────────────────────────────────────────────
    compress:
      compress: {}

    # ── IP allowlist — private access only ───────────────────────────────────
    # Uncomment and add your IP to restrict Traefik dashboard / admin services
    # ip-allowlist:
    #   ipAllowList:
    #     sourceRange:
    #       - "YOUR.IP.ADDRESS/32"
    #       - "10.0.0.0/8"

    # ── CORS for API endpoints ────────────────────────────────────────────────
    cors-api:
      headers:
        accessControlAllowOriginList:
          - "https://${BASE_DOMAIN}"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Api-Key"
        accessControlMaxAge: 100
        addVaryHeader: true

  # ── TLS configuration ────────────────────────────────────────────────────────
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      sniStrict: true
      # Disabling TLS 1.0 and 1.1 — these are deprecated and insecure.
      # If a client requires them, it's time for a new client.

    modern:
      # TLS 1.3 only — use for max security where all clients are modern.
      minVersion: VersionTLS13
